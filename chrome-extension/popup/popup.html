<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <title>Avtonet Bot</title>
  <style>
    body {
      margin: 0;
      width: 240px;
      padding: 1rem;
      background: #111827;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    h1 { font-size: 1rem; margin: 0 0 0.75rem 0; text-align: center; }
    .btn {
      display: block;
      width: 100%;
      padding: 0.5rem 1rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font: inherit;
    }
    .btn:hover { background: #1d4ed8; }
    .muted { color: #9ca3af; font-size: 0.75rem; margin-top: 0.75rem; text-align: center; }
  </style>
</head>
<body>
  <h1>Avtonet Bot</h1>
  <button class="btn" id="open">Odpri nadzorno ploščo</button>
  <p class="muted">Obnavljanje teče v aktivnem zavihku.</p>
  <script src="popup.js"></script>
</body>
</html>
