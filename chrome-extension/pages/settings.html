<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <title>Konfiguracija - Avtonet Bot</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div class="app">
    <div class="card">
      <h2 class="title">Konfiguracija</h2>
      <p class="muted" style="margin-top:0;margin-bottom:1rem;font-size:0.85rem">
        Prijavite se v avto.net v zavihku brskalnika.
        Sem vpišite samo e-pošto za preverjanje naročnine.
      </p>
      <form id="form">
        <label>
          <span class="lbl">Email</span>
          <input type="email" id="email" required />
        </label>
        <div class="row" style="gap: 0.5rem">
          <button type="submit" class="btn">Posodobi</button>
          <button type="button" class="btn" id="cancel">Prekliči</button>
        </div>
      </form>
    </div>
  </div>
  <script type="module" src="settings.js"></script>
</body>
</html>
